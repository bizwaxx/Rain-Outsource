openapi: 3.0.3
info:
  title: Rainout Source API
  version: 0.6.0
  description: Agent-readable field and rainout status API for outdoor games and events. The Austin pilot now supports Krieg/Craig, Havins, and an Austin metro public/private expansion batch with live National Weather Service game-time weather, conservative official source polling, and stricter outside-agent answer requirements.
  x-creator: JEEZ Labs
servers:
  - url: https://rainout-agent-source.vercel.app
    description: Live production backend
  - url: http://127.0.0.1:8000
    description: Local development backend
paths:
  /health:
    get:
      summary: Health check for the Rainout Source backend.
      responses:
        "200":
          description: Backend is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: rainout-source
  /v1/fields:
    get:
      summary: List fields currently supported by Rainout Source.
      description: Agents should call this endpoint to discover supported field IDs, aliases, status URLs, and official rainout sources before asking for status.
      responses:
        "200":
          description: Supported field directory
          content:
            application/json:
              schema:
                type: object
                required:
                  - service
                  - creator
                  - count
                  - fields
                properties:
                  service:
                    type: string
                    example: rainout-source
                  creator:
                    type: string
                    example: JEEZ Labs
                  count:
                    type: integer
                    example: 6
                  fields:
                    type: array
                    items:
                      type: object
                      required:
                        - field_id
                        - name
                        - aliases
                        - status_url
                      properties:
                        field_id:
                          type: string
                          example: austin-tx-havins-softball-complex
                        name:
                          type: string
                          example: Havins Softball Complex
                        city:
                          type: string
                          example: Austin
                        state:
                          type: string
                          example: TX
                        address:
                          type: string
                          example: 12138 N Lamar Blvd, Austin, TX 78753
                        sport:
                          type: string
                          example: softball
                        rainout_phone:
                          type: string
                          example: 512-978-2680
                        ownership_type:
                          type: string
                          example: public
                        status_source_type:
                          type: string
                          example: official_county_park_page
                        aliases:
                          type: array
                          items:
                            type: string
                          example: [Havins, Havins Complex, Havins Softball, austin-tx-havins-softball-complex]
                        weather_source:
                          type: string
                          example: National Weather Service API
                        official_status_source_url:
                          type: string
                          example: https://www.austintexas.gov/department/athletics
                        official_status_source_name:
                          type: string
                          example: Austin Parks and Recreation Athletics page
                        status_url:
                          type: string
                          example: https://rainout-agent-source.vercel.app/v1/status?field_id=Havins&game_time={ISO-8601-game-time}
  /v1/status:
    get:
      summary: Get official status, rain chance, and game-time play probability for a field/game.
      parameters:
        - in: query
          name: field_id
          required: true
          schema:
            type: string
          description: Field ID or supported alias. Current aliases include Krieg, Craig, Havins, Northeast Metro, Southeast Metro, Oak Hill Youth Sports, and Manchaca Optimist.
          example: Havins
        - in: query
          name: game_time
          required: true
          schema:
            type: string
          example: "2026-06-06T20:20:00-05:00"
      responses:
        "200":
          description: Agent-readable status result
          content:
            application/json:
              schema:
                type: object
                required:
                  - field
                  - official_status
                  - rain_chance_percent
                  - game_time_play_probability_percent
                  - source
                  - spoken_answer
                properties:
                  creator:
                    type: string
                    example: JEEZ Labs
                  field:
                    type: string
                  field_id:
                    type: string
                  address:
                    type: string
                  official_status:
                    type: string
                    enum: [on, cancelled, delayed, field_closed, unknown]
                  official_status_source_url:
                    type: string
                  official_status_source_name:
                    type: string
                  official_status_checked:
                    type: boolean
                    description: True when Rainout Source checked the official source page for this request.
                  official_status_last_checked:
                    type: string
                    nullable: true
                    description: ISO-8601 timestamp for the official source check when available.
                  rain_chance_percent:
                    type: integer
                    minimum: 0
                    maximum: 100
                  thunderstorm_likely:
                    type: boolean
                  game_time_play_probability_percent:
                    type: integer
                    minimum: 0
                    maximum: 100
                  recommendation:
                    type: string
                    enum: [likely_safe_to_drive, check_again_before_leaving, do_not_drive, check_official_source]
                  source:
                    type: string
                  spoken_answer:
                    type: string
                  answer_requirements:
                    type: object
                    description: Required wording outside agents must include in the final user-facing answer.
              example:
                creator: JEEZ Labs
                field: Havins Softball Complex
                field_id: austin-tx-havins-softball-complex
                address: 12138 N Lamar Blvd, Austin, TX 78753
                official_status: unknown
                official_status_source_url: https://www.austintexas.gov/department/athletics
                official_status_source_name: Austin Parks and Recreation Athletics page
                official_status_checked: true
                official_status_last_checked: "2026-06-06T19:10:00+00:00"
                rain_chance_percent: 16
                thunderstorm_likely: true
                game_time_play_probability_percent: 50
                recommendation: check_again_before_leaving
                source: "Rainout phone: 512-978-2680; weather: National Weather Service"
                spoken_answer: "Official rainout status is unknown for Havins Softball Complex. At game time, 8:20 PM, rain chance is 16% with storms possible. Estimated play probability is 50%. Please call 512-978-2680 before leaving."
                answer_requirements:
                  must_include: [field name, official status, rain chance, play probability, rainout phone or official source]
                  if_official_status_unknown: "Say official status is unknown and tell the user to call 512-978-2680 before leaving."
